description: OpenAI Responses API smoke evaluation

prompts:
  - 'Return exactly the lowercase word "hello" and nothing else.'

providers:
  - id: openai:responses:gpt-4.1-mini
    config:
      temperature: 0
      max_output_tokens: 16
      maxRetries: 0

tests:
  - description: Follows an exact-output instruction
    assert:
      - type: equals
        value: hello
