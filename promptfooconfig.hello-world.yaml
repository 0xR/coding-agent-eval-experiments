description: Coding agents build a Node.js hello-world project

prompts:
  - "Create a Node.js 'hello world' project in the current directory. It should be runnable with `npm start`, which should print hello world to the console."

providers:
  - id: file://providers/agent.js
    label: claude-code-opus-4-8
    config:
      agent: claude
      model: claude-opus-4-8
  - id: file://providers/agent.js
    label: claude-code-haiku-4-5
    config:
      agent: claude
      model: claude-haiku-4-5-20251001
  # Codex on a ChatGPT account only exposes one model (gpt-5.6-sol here), so the
  # "flagship vs cheap" axis for Codex is reasoning effort, not the model.
  - id: file://providers/agent.js
    label: codex-sol-high
    config:
      agent: codex
      model: gpt-5.6-sol
      reasoningEffort: high
  - id: file://providers/agent.js
    label: codex-sol-low
    config:
      agent: codex
      model: gpt-5.6-sol
      reasoningEffort: low

extensions:
  - file://hooks.js:hook

# Run each agent once per test (raise --repeat later for pass-rate signal).
tests:
  - description: Builds a runnable hello-world project
    assert:
      - type: javascript
        value: file://assertions/hello-world.js
